<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kosmetichka - Рулетка красоты и призов</title>
    
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- CSS Files - ПРАВИЛЬНЫЙ ПОРЯДОК -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/tasks.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/mega-roulette.css">
    
    <!-- Новые стили для навигации и кнопок -->
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/button-states.css">
    
    <!-- Fallback styles -->
    <style>
        /* Базовые стили на случай если CSS файлы не загрузятся */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #EF55A5 0%, #809EFF 50%, #CCD537 100%);
            color: white;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }
        
        #app {
            max-width: 414px;
            margin: 0 auto;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
        }
        
        /* КРИТИЧЕСКИ ВАЖНЫЙ СТИЛЬ ЗАГРУЗОЧНОГО ЭКРАНА */
        .loading-screen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1b3d 100%) !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            z-index: 10000 !important;
            transition: opacity 0.5s ease !important;
        }
        
        .loading-spinner {
            font-size: 48px;
            animation: loadingPulse 1.5s ease-in-out infinite;
            margin-bottom: 20px;
        }
        
        .loading-text {
            font-size: 16px;
            opacity: 0.8;
            text-align: center;
        }
        
        @keyframes loadingPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        
        /* Критически важные стили навигации */
        .bottom-nav {
            position: fixed !important;
            bottom: 0 !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 100% !important;
            max-width: 414px !important;
            background: rgba(42, 42, 42, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            z-index: 1000 !important;
            display: flex !important;
            justify-content: space-around !important;
            padding: 12px 8px !important;
        }
        
        .status-messages-container {
            position: fixed !important;
            top: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 90% !important;
            max-width: 380px !important;
            z-index: 2000 !important;
        }
        
        /* Анимированный фон */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #EF55A5 0%, #809EFF 50%, #CCD537 100%);
            z-index: -2;
        }
        
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26,26,26,0.8) 0%, rgba(15,15,15,0.9) 100%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-background"></div>
    <div class="background-overlay"></div>

    <!-- Main App Container -->
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-spinner">🎰</div>
            <div class="loading-text">Загрузка Kosmetichka...</div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script type="module">
        // Проверяем поддержку модулей
        console.log('🚀 Инициализация приложения...');
        
        try {
            // Динамический импорт для лучшей совместимости
            const { default: App } = await import('./js/app.js');
            
            // Ждем полной загрузки DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }
            
            function initApp() {
                try {
                    console.log('🎮 Создание экземпляра приложения...');
                    window.app = new App();
                    
                    // ИСПРАВЛЕНИЕ: Запускаем инициализацию правильно
                    window.app.init().then(() => {
                        console.log('✅ Приложение полностью готово!');
                    }).catch(error => {
                        console.error('❌ Ошибка инициализации:', error);
                        showErrorScreen(error);
                    });
                    
                } catch (error) {
                    console.error('❌ Ошибка создания приложения:', error);
                    showErrorScreen(error);
                }
            }
            
        } catch (error) {
            console.error('❌ Ошибка загрузки модулей:', error);
            showErrorScreen(error);
        }
        
        // Функция показа экрана ошибки
        function showErrorScreen(error) {
            const app = document.getElementById('app');
            if (app) {
                app.innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; background: linear-gradient(135deg, #1a1a1a 0%, #2d1b3d 100%); color: white;">
                        <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
                        <h2>Произошла ошибка</h2>
                        <p style="opacity: 0.8; margin: 10px 0;">Не удалось загрузить приложение Kosmetichka</p>
                        <p style="font-size: 14px; margin-top: 10px; opacity: 0.6; max-width: 300px;">
                            ${error.message || 'Неизвестная ошибка'}
                        </p>
                        <button onclick="window.location.reload()" style="background: linear-gradient(135deg, #EF55A5, #ff6b9d); border: none; color: white; padding: 12px 24px; border-radius: 25px; margin-top: 20px; cursor: pointer;">
                            🔄 Перезагрузить
                        </button>
                        <button onclick="localStorage.clear(); window.location.reload();" style="background: linear-gradient(135deg, #666, #444); border: none; color: white; padding: 8px 16px; border-radius: 20px; margin-top: 10px; cursor: pointer; font-size: 12px;">
                            🧹 Очистить данные
                        </button>
                    </div>
                `;
            }
        }
        
        // ИСПРАВЛЕНИЕ: Принудительное скрытие загрузочного экрана через 5 секунд
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && loadingScreen.style.display !== 'none') {
                console.log('⚠️ Принудительное скрытие загрузочного экрана');
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500);
            }
        }, 5000);
        
        // Глобальная обработка ошибок
        window.addEventListener('error', (event) => {
            console.error('🚨 Глобальная ошибка:', event.error);
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            console.error('🚨 Необработанное отклонение промиса:', event.reason);
        });
        
    </script>
    
    <!-- Fallback для браузеров без поддержки модулей -->
    <script nomodule>
        document.getElementById('app').innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center;">
                <div style="font-size: 48px; margin-bottom: 20px;">📱</div>
                <h2>Браузер не поддерживается</h2>
                <p style="margin: 20px 0;">Используйте более современный браузер или откройте приложение в Telegram</p>
                <button onclick="window.location.href='https://telegram.org'" style="background: linear-gradient(135deg, #EF55A5, #ff6b9d); border: none; color: white; padding: 12px 24px; border-radius: 25px; cursor: pointer;">
                    Открыть в Telegram
                </button>
            </div>
        `;
    </script>
</body>
</html>
